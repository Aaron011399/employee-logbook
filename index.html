<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Log Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Employee Log Book</h1>
    <nav>
      <button id="checkInTab">Check-In</button>
      <button id="checkOutTab">Check-Out</button>
      <button id="adminTab">Admin Panel</button>
    </nav>
  </header>

  <main>
    <!-- Check-In Section -->
    <section id="checkInSection" class="tab-section">
      <h2>Check-In</h2>
      <div id="checkInGrid" class="employee-grid"></div>
    </section>

    <!-- Check-Out Section -->
    <section id="checkOutSection" class="tab-section hidden">
      <h2>Check-Out</h2>
      <div id="checkOutGrid" class="employee-grid"></div>
    </section>

    <!-- Admin Panel -->
    <section id="adminSection" class="tab-section hidden">
      <h2>Admin Panel</h2>
      <form id="addEmployeeForm">
        <input type="text" id="employeeName" placeholder="Employee Name" required>
        <button type="submit">Add Employee</button>
      </form>

      <h3>Employee List</h3>
      <ul id="employeeList"></ul>

      <h3>Log Records</h3>
      <table id="logTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button id="exportCSV">Export to CSV</button>
    </section>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
